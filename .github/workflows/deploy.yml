name: Deploy GhostTrick via Tailscale

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to VPS2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH over Tailscale
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << DEPLOY_EOF
            cd ~/repos/ghosttrickv2

            # Pull latest code
            git pull origin main || git pull origin master

            # Restart Docker (auto-rebuild changed parts)
            docker compose down
            docker compose up -d --build

            # Clean up Docker images
            docker image prune -f

            # Seed database if empty
            chmod +x ./scripts/seed-db.sh
            DB_PASSWORD="$DB_PASSWORD" ./scripts/seed-db.sh

            echo "GhostTrick deployed!"
          DEPLOY_EOF
