name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master # Hỗ trợ cả 2 tên nhánh phổ biến

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Di chuyển vào thư mục dự án (Thay đổi tên thư mục nếu bạn đặt khác trên VPS)
            cd Ghosttrick
            
            # Kéo code mới nhất từ Github về
            git pull origin main || git pull origin master
            
            # Khởi động lại Docker (Tự động build lại những phần có code thay đổi)
            docker-compose up -d --build
            
            # Dọn dẹp các file rác của Docker (tùy chọn để giải phóng bộ nhớ)
            docker image prune -f
