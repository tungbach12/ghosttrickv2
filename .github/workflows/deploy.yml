name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Navigate to project directory
            cd ~/repos/ghosttrickv2
            
            # Pull latest code
            git pull origin main || git pull origin master
            
            # Restart Docker (auto-rebuild changed parts)
            docker-compose down
            docker-compose up -d --build
            
            # Clean up Docker images (optional to free memory)
            docker image prune -f
            
            # Seed database if empty (auto-runs init.sql when DB has no users)
            chmod +x ./scripts/seed-db.sh
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" ./scripts/seed-db.sh
