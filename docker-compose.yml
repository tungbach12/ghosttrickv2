version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ghosttrick_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=GhostTrickDb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghosttrick_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Connection string uses the container name 'db' instead of localhost
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=GhostTrickDb;Username=postgres;Password=${DB_PASSWORD}
      - Jwt__Key=${Jwt__Key}
      - Jwt__Issuer=${Jwt__Issuer}
      - Jwt__Audience=${Jwt__Audience}
      - Jwt__AccessTokenExpiryMinutes=${Jwt__AccessTokenExpiryMinutes}
      - Jwt__RefreshTokenExpiryDays=${Jwt__RefreshTokenExpiryDays}
      - Cloudinary__CloudName=${Cloudinary__CloudName}
      - Cloudinary__ApiKey=${Cloudinary__ApiKey}
      - Cloudinary__ApiSecret=${Cloudinary__ApiSecret}
      - Email__Username=${Email__Username}
      - Email__Password=${Email__Password}
      - Google__ClientId=${Google__ClientId}
      - Telegram__Token=${Telegram__Token}
      - Telegram__ChatId=${Telegram__ChatId}
    volumes:
      - postgres_backups:/app/backups
    ports:
      - "8080:10000"
    restart: unless-stopped

  web:
    build:
      context: ./GhostTrickFe
      dockerfile: Dockerfile
      # We need to pass the VITE_API_URL to the build process so it's baked into the React app
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: ghosttrick_web
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_backups:
